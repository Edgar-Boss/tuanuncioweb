<!DOCTYPE html>
<!-- Version 3: Ads with images, links modal with social icons - v3 for future reference -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4×4 Pixel Grid (v3)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100vh;
        }

        .top-bar {
            display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                flex-shrink: 0;
            border-bottom: 1px solid #999;
        }

        .corner {
            width: 2rem;
            flex-shrink: 0;
            border-right: 1px solid #999;
        }

        .col-labels {
            flex: 1;
            display: flex;
        }

        .col-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(1.2vw, 1.2vh);
            font-weight: 600;
            color: transparent;
            border-right: 1px solid #ccc;
            min-width: 0;
        }

        .rows {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .main-row {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .row-label {
            width: 2rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(1.2vw, 1.2vh);
            font-weight: 600;
            color: transparent;
            border-right: 1px solid #999;
            border-bottom: 1px solid #999;
        }

        .grid-row {
            flex: 1;
            display: flex;
            min-width: 0;
        }

        .cell {
            flex: 1;
            background: #fff;
            border-right: 1px solid #999;
            border-bottom: 1px solid #999;
            min-width: 0;
        }

        .cell:hover {
            background: #f5f5f5;
        }

        .rows {
            position: relative;
        }

        .ad-overlay {
            position: absolute;
            top: 0;
            left: 2rem;
            z-index: 1;
            right: 0;
            bottom: 0;
            display: grid;
            grid-template-columns: repeat(26, 1fr);
            grid-template-rows: repeat(26, 1fr);
            pointer-events: none;
            padding: 1px;
            gap: 0;
        }

        .ad-overlay .ad {
            pointer-events: auto;
            padding: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        .ad-overlay .ad img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ad-overlay .ad:hover img {
            opacity: 0.9;
        }

        .links-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .links-modal.open {
            display: flex;
        }

        .links-modal-content {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            min-width: 280px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            position: relative;
        }

        .links-modal-close {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            line-height: 1;
        }

        .links-modal-close:hover {
            color: #333;
        }

        .links-modal h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .links-modal a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.8rem;
            margin: 0.25rem 0;
            color: #1a73e8;
            text-decoration: none;
            border-radius: 8px;
        }

        .links-modal a:hover {
            background: #f0f7ff;
        }

        .links-modal a .link-icon {
            width: 1.25rem;
            height: 1.25rem;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .ad-overlay { left: 1.75rem; }
        }

        @media (max-width: 480px) {
            .ad-overlay { left: 1.5rem; }
        }

        /* Responsive: mobile - full screen, same flex layout as desktop */
        @media (max-width: 768px) {
            .page {
                height: 100vh;
                height: 100dvh; /* Dynamic viewport for mobile browsers */
            }

            .corner {
                width: 1.75rem;
            }

            .row-label {
                width: 1.75rem;
                font-size: min(2.5vw, 2.5vh);
            }

            .col-label {
                font-size: min(2.5vw, 2.5vh);
            }

            .cell {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
        }

        @media (max-width: 480px) {
            .corner,
            .row-label {
                width: 1.5rem;
            }

            .col-label,
            .row-label {
                font-size: min(2.2vw, 2.2vh);
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div class="corner"></div>
            <div class="col-labels" id="colLabels"></div>
        </div>
        <div class="rows" id="rows">
            <div class="ad-overlay" id="adOverlay"></div>
        </div>
    </div>

    <div class="links-modal" id="linksModal">
        <div class="links-modal-content">
            <button class="links-modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
            <h3 id="modalTitle">Links</h3>
            <div id="modalLinks"></div>
        </div>
    </div>

    <script src="ads/ads-config.js"></script>
    <script>
        const ROWS = 26;
        const COLS = 26;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        function getRowLabel(r) {
            return r < 26 ? letters[r] : 'A' + letters[r - 26];
        }

        const colLabels = document.getElementById('colLabels');
        const rowsEl = document.getElementById('rows');

        for (let c = 0; c < COLS; c++) {
            const label = document.createElement('div');
            label.className = 'col-label';
            label.textContent = c + 1;
            colLabels.appendChild(label);
        }

        for (let r = 0; r < ROWS; r++) {
            const mainRow = document.createElement('div');
            mainRow.className = 'main-row';

            const rowLabel = document.createElement('div');
            rowLabel.className = 'row-label';
            rowLabel.textContent = getRowLabel(r);
            mainRow.appendChild(rowLabel);

            const gridRow = document.createElement('div');
            gridRow.className = 'grid-row';
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('click', () => {
                    cell.style.background = cell.style.background === 'black' ? '#fff' : 'black';
                });
                gridRow.appendChild(cell);
            }
            mainRow.appendChild(gridRow);
            rowsEl.appendChild(mainRow);
        }

        // Parse cell "J10" or "AA10" -> {row, col} (0-indexed)
        function parseCell(str) {
            const s = str.toUpperCase();
            const match = s.match(/^([A-Z]{1,2})(\d+)$/);
            if (!match) return { row: 0, col: 0 };
            const rowLabel = match[1];
            const col = parseInt(match[2], 10) - 1;
            const row = rowLabel.length === 1
                ? letters.indexOf(rowLabel)
                : 26 + letters.indexOf(rowLabel[1]);
            return { row, col };
        }

        // Render ads
        const adOverlay = document.getElementById('adOverlay');
        const linksModal = document.getElementById('linksModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalLinks = document.getElementById('modalLinks');

        adsConfig.forEach(({ folder, config }) => {
            const { cells, rowSpan, colSpan, image, name, links } = config;
            const start = parseCell(cells[0]);
            const imgPath = `ads/${folder}/${image}`;

            const ad = document.createElement('div');
            ad.className = 'ad';
            ad.style.gridRow = `${start.row + 1} / span ${rowSpan || 1}`;
            ad.style.gridColumn = `${start.col + 1} / span ${colSpan || 1}`;

            const img = document.createElement('img');
            img.src = imgPath;
            img.alt = name || folder;
            img.loading = 'lazy';
            ad.appendChild(img);

            ad.addEventListener('click', (e) => {
                e.stopPropagation();
                modalTitle.textContent = name || folder;
                modalLinks.innerHTML = '';
                const icons = {
                    web: '<svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
                    instagram: '<svg class="link-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>',
                    facebook: '<svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
                    youtube: '<svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
                    twitter: '<svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
                    tiktok: '<svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>'
                };
                Object.entries(links || {}).forEach(([key, url]) => {
                    const label = { web: 'Sitio web', instagram: 'Instagram', facebook: 'Facebook', youtube: 'YouTube', twitter: 'X (Twitter)', tiktok: 'TikTok' }[key] || key;
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.innerHTML = (icons[key] || icons.web) + ' <span>' + label + '</span>';
                    modalLinks.appendChild(a);
                });
                linksModal.classList.add('open');
            });

            adOverlay.appendChild(ad);
        });

        linksModal.addEventListener('click', (e) => {
            if (e.target === linksModal) linksModal.classList.remove('open');
        });
        document.getElementById('modalClose').addEventListener('click', () => {
            linksModal.classList.remove('open');
        });
    </script>
</body>
</html>
